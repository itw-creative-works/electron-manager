appId: com.itwcw.myapp
productName: MyApp
copyright: "© ITW Creative Works"

directories:
  output: release
  buildResources: src/assets/icons

files:
  - dist/**/*
  - package.json
  - "!**/*.map"
  - "!.env"
  - "!.env.*"
  - "!**/*.env"

asar: true

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false # set via afterSign hook

win:
  target:
    - target: nsis
      arch: [x64]
  signtoolOptions:
    signingHashAlgorithms: [sha256]
  # signing is handled out-of-band by `npx mgr sign-windows` based on EM_WIN_SIGN_STRATEGY.

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility

# `afterSign:` is injected by gulp/build-config and points at EM's built-in notarize
# implementation (resolved via require.resolve('electron-manager/hooks/notarize')). The
# consumer can extend it with an optional hooks/notarize/post.js — see docs/hooks.md.

# `publish:` is overwritten by gulp/build-config from config.releases (default: <owner>/update-server).
# Edit config/electron-manager.json's `releases` block, not this file.
publish:
  provider: github
  releaseType: release
