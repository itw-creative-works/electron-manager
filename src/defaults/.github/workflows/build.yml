name: Build & Release

# Manual-trigger only — releases are intentional, not a side effect of every commit.
on:
  workflow_dispatch:

env:
  NODE_VERSION: '{{ versions.node }}'
  EM_BUILD_MODE: 'true'
  EM_IS_PUBLISH: 'true'
  EM_IS_SERVER:  'true'
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Audit/build tests stage minimal scaffolds without icons / signing — explicitly
      # off the publish path so they don't fail required-file checks meant for real builds.
      EM_BUILD_MODE: 'false'
      EM_IS_PUBLISH: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      # Electron's main + renderer test layers need a display server on Linux.
      - run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libnss3 libxss1 libasound2t64 libgbm1 || sudo apt-get install -y xvfb libgtk-3-0 libnss3 libxss1 libasound2 libgbm1
      - run: npm ci
      - name: Run framework + project test suites
        run: xvfb-run --auto-servernum -- npx mgr test --reporter json
        env:
          # Skip integration suites that require live backend creds. Set to '1' on a separate
          # workflow if you want to run them.
          EM_TEST_INTEGRATION: '0'

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx mgr setup

      # macOS — decode signing assets from secrets, then sign + notarize + publish.
      # `npx mgr push-secrets` uploads .p12 / .p8 files as base64-encoded secrets;
      # the workflow decodes them back to disk for electron-builder + notarytool to read.
      - if: matrix.os == 'macos-latest'
        run: |
          mkdir -p build/certs
          echo "${{ secrets.CSC_LINK }}"      | base64 --decode > build/certs/dev-id.p12
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > build/certs/AuthKey.p8
      - if: matrix.os == 'macos-latest'
        env:
          CSC_LINK:         build/certs/dev-id.p12
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY:    build/certs/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID:    ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:local

      # Linux — no signing
      - if: matrix.os == 'ubuntu-latest'
        run: npm run release:local

      # Windows — package (build + electron-builder package) unsigned. We do NOT publish
      # here. Mac/linux's `npm run release:local` step already created the GH Release via
      # electron-builder publish; windows-sign uploads signed .exe to that same release.
      - if: matrix.os == 'windows-latest'
        env:
          EM_SKIP_WIN_SIGN: 'true'
        run: npm run package

      - if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned
          # Capture installer + auto-updater feed + blockmap so windows-sign can re-upload them all.
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap

  # Resolve the signing strategy from config/electron-manager.json. We do this in a tiny job
  # (just runs node + reads the JSON5) so downstream jobs can gate on the result. Single
  # source of truth = the consumer's config file; workflow doesn't duplicate the value.
  windows-strategy:
    name: Resolve Windows signing strategy
    needs: build
    runs-on: ubuntu-latest
    outputs:
      strategy: ${{ steps.resolve.outputs.strategy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - id: resolve
        run: |
          STRATEGY=$(node -e "const fs=require('fs'),JSON5=require('json5');const c=JSON5.parse(fs.readFileSync('config/electron-manager.json','utf8'));console.log(c?.signing?.windows?.strategy || 'self-hosted');")
          echo "strategy=$STRATEGY" >> "$GITHUB_OUTPUT"
          echo "Resolved Windows signing strategy: $STRATEGY"

  windows-sign:
    name: Sign Windows
    needs: [build, windows-strategy]
    # Strategy comes from config.signing.windows.strategy (read by windows-strategy job).
    #   self-hosted (default) — runs on a self-hosted runner with EV USB token attached
    #   cloud                 — runs on hosted windows-latest, calls cloud signing provider
    #   local                 — skip this job; sign locally via `npx mgr sign-windows`
    if: ${{ needs.windows-strategy.outputs.strategy != 'local' }}
    runs-on: ${{ needs.windows-strategy.outputs.strategy == 'cloud' && fromJSON('["windows-latest"]') || fromJSON('["self-hosted","windows","ev-token"]') }}
    # Use cmd.exe (not PowerShell) on Windows. Self-hosted runners often have PowerShell
    # ExecutionPolicy set to Restricted, which blocks the Actions-generated wrapper .ps1
    # scripts that GH spits out for every `run:` step. cmd.exe has no such restriction
    # and runs the same `npm ci` / `npx ...` commands fine.
    defaults:
      run:
        shell: cmd
    env:
      # Cloud-provider env vars — only one set is consumed depending on `signing.windows.cloud.provider` in config:
      AZURE_TENANT_ID:                  ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:                  ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET:              ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TRUSTED_SIGNING_ENDPOINT:   ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      SSLCOM_USERNAME:                  ${{ secrets.SSLCOM_USERNAME }}
      SSLCOM_PASSWORD:                  ${{ secrets.SSLCOM_PASSWORD }}
      SSLCOM_CREDENTIAL_ID:             ${{ secrets.SSLCOM_CREDENTIAL_ID }}
      DIGICERT_API_KEY:                 ${{ secrets.DIGICERT_API_KEY }}
      DIGICERT_KEYPAIR_ALIAS:           ${{ secrets.DIGICERT_KEYPAIR_ALIAS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: windows-unsigned
          path: release
      - run: npx mgr sign-windows --in release --out release/signed
      # Upload the SIGNED Windows assets to the existing update-server release (created
      # by mac/linux's electron-builder publish step). Then mirror to download-server's
      # installer tag with stable filenames.
      - run: npx mgr finalize-release --signed-dir release/signed

  finalize:
    name: Finalize release
    # Run after every required job. windows-sign is skipped when strategy=local; this
    # job still runs and just won't have signed Windows assets to upload.
    needs: [build, windows-sign]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Flip the update-server release from Draft to Published so electron-updater
      # can read it. Idempotent — safe to run even if already published.
      - run: npx mgr finalize-release --publish
